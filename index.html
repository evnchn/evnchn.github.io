<html>

	<script>
	var xml;
var xmldoc;

document.getElementById('trigger').onclick = function() {
  var temp;
  xml = document.getElementById('textarea').value.replace('<?xml version="1.0" encoding="UTF-8"?>', "");
  xmlDoc = new DOMParser().parseFromString(xml, "text/xml");

  var seed = xmlDoc.getElementsByTagName("course")[0].getAttribute('seed');
  var texts = xmlDoc.getElementsByTagName("text");
  for (var i = 0; i < texts.length; i++) {
    try {
      var real = "<b>" + decrypt(texts[i].getAttribute('correct'), Number(seed)) + "</b>";

      var att = document.createAttribute("text");
      att.value = real;
      texts[i].setAttributeNode(att);

    } catch (e) {

    }
    document.getElementById('p').innerHTML += (texts[i].getAttribute('text') + '<br>')
  }




}
document.getElementById('trigger2').onclick = function() {
  xml = document.getElementById('textarea').value.replace('<?xml version="1.0" encoding="UTF-8"?>', "");
  xmlDoc = new DOMParser().parseFromString(xml, "text/xml");

  var seed = xmlDoc.getElementsByTagName("course")[0].getAttribute('seed');
  var texts = xmlDoc.getElementsByTagName("question");
  for (var i = 0; i < texts.length; i++) {
    try {
      var real = "<b>" + decrypt(texts[i].getAttribute('correct'), Number(seed)) + "</b>";

      var att = document.createAttribute("text");
      att.value = texts[i].getAttribute('text') + ": " + real;
      texts[i].setAttributeNode(att);

    } catch (e) {

    }
    document.getElementById('p').innerHTML += (texts[i].getAttribute('text') + '<br>')
  }




}

function decrypt(inputstring, seed) {
  var charset = [];

  charset[0] = "c";

  var placeholder2;

    placeholder4 = inputstring.charCodeAt(placeholder2);
    if (placeholder4 == 32) {
      //current chaacter is space
      placeholder5 = 0;
    } else if (placeholder4 >= 42 && placeholder4 <= 57) {
      //special chars + number
      placeholder5 = placeholder4 - 41;
      //values possible: 1-16


    } else if (placeholder4 >= 64 && placeholder4 <= 126) {
      //mostly alphabets

    } else placeholder5 = -1;
    if (placeholder5 >= 0 && placeholder5 <= 79) {
      //good range
      placeholder5 += (placeholder2 + seed);
      placeholder5 = placeholder5 % 80;
      placeholder3 += charset[placeholder5];

    } else {
      //bad range
      placeholder3 += inputstring.charAt(placeholder2);
    }
  }
  return placeholder3
}
